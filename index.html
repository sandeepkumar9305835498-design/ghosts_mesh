<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ghost Mesh Live</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme">

    <div id="login-screen" class="screen">
        <div class="login-box">
            <h2>👻 Ghost Mesh</h2>
            <p>For safety and accountability, please verify your identity once.</p>
            <input type="tel" id="phone-number" placeholder="Enter Phone Number (+91...)" required>
            <button onclick="verifyAndLogin()">Connect to Live Mesh</button>
        </div>
    </div>

    <div id="wall-screen" class="screen hidden">
        <header>
            <div class="header-left">
                <div class="profile-container" onclick="triggerDPUpload()">
                    <img id="my-dp-display" src="https://api.dicebear.com/7.x/bottts/svg?seed=ghost" alt="DP" class="user-avatar">
                </div>
                <div>
                    <h3 style="margin: 0; font-size: 16px;">Ghost Mesh</h3>
                    <span id="user-badge" style="font-size: 12px; opacity: 0.7;">Initializing...</span>
                </div>
            </div>
            
            <div class="header-right">
                <button id="theme-toggle-btn" onclick="toggleAppTheme()" class="icon-btn">☀️</button>
                <button onclick="openConnectModal()" class="action-btn">＋ Connect</button>
            </div>
        </header>

        <input type="file" id="dp-file-input" accept="image/*" style="display: none;" onchange="handleDPChange(event)">

        <div id="messages-container">
            <div class="system-msg">Searching and connecting to local live network nodes...</div>
        </div>

        <div id="typing-indicator" class="hidden"></div>

        <div class="input-area">
            <input type="text" id="msg-input" placeholder="Type a message...">
            <button onclick="sendMessage()" class="send-btn">Send</button>
        </div>
    </div>

    <div id="connect-modal" class="modal-overlay hidden">
        <div class="modal-box">
            <h4>Connect to a Peer Node</h4>
            <p>Enter your friend's active Ghost ID to establish a secure P2P link.</p>
            <input type="text" id="peer-id-input" placeholder="e.g. Ghost-1234">
            <div class="modal-actions">
                <button onclick="closeConnectModal()" class="cancel-btn">Cancel</button>
                <button onclick="connectFromUI()" class="confirm-btn">Connect</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
